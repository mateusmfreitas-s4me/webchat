<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Webchat Demo</title>
</head>
<body>
  <h1>P&aacute;gina de demonstra&ccedil;&atilde;o</h1>
  <p>O widget de chat aparece no canto inferior direito.</p>
  <!--
    Para customizar, adicione data-attributes no script. Exemplo:

    <script src="widget.js"
      data-primary="#FF5722"
      data-launcher-color="#4CAF50"
      data-title="Fale conosco"
      data-icon="https://meusite.com/icon.png"
      data-placeholder="Escreva aqui..."
      data-send-text="Enviar mensagem"
      data-intro="Bem-vindo! Como podemos ajudar?"
      data-typing-text="Digitando..."
      data-close-title="Sair do chat?"
      data-close-message="Deseja mesmo encerrar?"
      data-close-confirm="Sim"
      data-close-cancel="Voltar"
      data-end-notice="Chat encerrado"
      data-bubble-agent="#e8e8e8"
      data-bubble-agent-text="#333"
      data-bubble-customer-text="#fff">
    </script>

    Todos os atributos sao opcionais. Sem eles, usa os valores padrao.
  -->
  <script src="widget.js"></script>
</body>
</html>
