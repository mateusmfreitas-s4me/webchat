<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --g-bg: #fff;
      --g-border: rgba(0,0,0,.10);
      --g-shadow: 0 12px 32px rgba(0,0,0,.18);
      --g-radius: 16px;
      --g-primary: #202AD0;
      --g-subtext: rgba(0,0,0,.65);
      --g-bubble-customer: var(--g-primary);
      --g-bubble-agent: #f2f3f5;
      --g-bubble-agent-text: #111;
      --g-bubble-customer-text: #fff;
      --g-font: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    body { font-family: var(--g-font); margin: 0; padding: 24px; }

    #myLauncher{
      position: fixed;
      right: 20px;
      bottom: 20px;

      width: 68px;
      height: 60px;

      background: #66E7E5;
      border-radius: 50% 90% 90% 90% / 40% 100% 100% 100%;
      display: grid;
      place-items: center;

      border: none;
      cursor: pointer;

      box-shadow: 0 18px 28px rgba(0,0,0,.25);
      -webkit-tap-highlight-color: transparent;
    }

    #myLauncher:active{ transform: translateY(1px); }

    #myLauncher img{
      width: 34px;
      height: 34px;
      display: block;
      object-fit: contain;
    }

    /* ===== CHAT OPEN/CLOSE ANIMATION ===== */
    #chatShell{
      position: fixed;
      right: 20px;
      bottom: 88px;

      width: min(92vw, 380px);
      height: clamp(420px, 70vh, 640px);

      background: var(--g-bg);
      border: 1px solid var(--g-border);
      border-radius: var(--g-radius);
      box-shadow: var(--g-shadow);

      display: flex;
      flex-direction: column;
      overflow: hidden;

      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;

      transition: transform .22s ease, opacity .22s ease;
      will-change: transform, opacity;
    }

    #chatShell.open{
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #chatHeader{
      flex: 0 0 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 10px 0 14px;
      background: var(--g-primary);
      color: #fff;
    }
    #chatHeader .title{ font-weight: 600; font-size: 14px; }

    #chatHeader .headerActions{
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #chatHeader .iconBtn{
      width: 32px; height: 32px; border-radius: 999px;
      border: none; cursor: pointer;
      background: rgba(255,255,255,.18);
      color: #fff;
      font-size: 18px;
      line-height: 32px;
    }

    #minimizeChat{
      font-size: 20px;
      line-height: 30px;
    }

    #chatMessages{
      flex: 1 1 auto;
      min-height: 0;
      padding: 12px;
      overflow: auto;
      background: #fff;
    }

    .msgRow{ display: flex; margin: 8px 0; }
    .msgRow.customer{ justify-content: flex-end; }
    .msgRow.agent{ justify-content: flex-start; }

    .msgRow.customer > div{
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
    }
    .msgRow.agent > div{
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
    }

    .bubble{
      width: fit-content;
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    .agent .bubble{
      background: var(--g-bubble-agent);
      color: var(--g-bubble-agent-text);
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 14px;
    }

    .customer .bubble{
      background: var(--g-bubble-customer);
      color: var(--g-bubble-customer-text);
      border-bottom-right-radius: 10px;
    }

    .meta{
      font-size: 11px;
      color: var(--g-subtext);
      margin-top: 4px;
    }

    .bubble a{
      color: inherit;
      text-decoration: underline;
      overflow-wrap: anywhere;
    }

    .quickReplies{
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      align-self: flex-end;
      justify-content: flex-end;
      max-width: 88%;
    }

    .quickReplies button{
      border: 1px solid rgba(0,0,0,.40);
      background: #fff;
      color: #111;

      padding: 7px 16px;
      border-radius: 999px;

      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }
    .quickReplies button:hover{ filter: brightness(.98); }
    .quickReplies button:active{ transform: translateY(1px); }
    .quickReplies button:disabled{ opacity: .55; cursor: not-allowed; }

    .systemNotice{
      width: 100%;
      text-align: center;
      margin: 10px 0;
      color: rgba(0,0,0,.45);
      font-size: 12px;
      line-height: 1.4;
      user-select: none;
      white-space: pre-line;
    }

    .chatIntro{
      width: 100%;
      text-align: center;
      margin: 10px 0 14px;
      color: rgba(0,0,0,.45);
      font-size: 12px;
      line-height: 1.4;
      user-select: none;
    }

    #typing{
      flex: 0 0 auto;
      padding: 0 12px 10px;
      font-size: 12px;
      color: var(--g-subtext);
      display: none;
    }

    #chatComposer{
      flex: 0 0 auto;
      border-top: 1px solid var(--g-border);
      display: flex; gap: 10px; align-items: center;
      padding: 10px;
      background: #fff;
    }
    #chatInput{
      flex: 1;
      height: 40px;
      border: 1px solid var(--g-border);
      border-radius: 999px;
      padding: 0 14px;
      outline: none;
      font-size: 14px;
    }
    #sendBtn{
      height: 40px;
      padding: 0 14px;
      border: none;
      border-radius: 999px;
      background: var(--g-primary);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    /* ===== Confirm Modal ===== */
    #confirmOverlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.32);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }

    #confirmOverlay.open{ display: flex; }

    #confirmModal{
      width: min(92vw, 360px);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      border: 1px solid rgba(0,0,0,.12);
      overflow: hidden;
      font-family: var(--g-font);
    }

    #confirmModal .cmHeader{
      padding: 14px 16px;
      font-weight: 700;
      font-size: 14px;
      background: #f6f7f8;
      border-bottom: 1px solid rgba(0,0,0,.10);
    }

    #confirmModal .cmBody{
      padding: 14px 16px;
      font-size: 13px;
      color: rgba(0,0,0,.70);
      line-height: 1.4;
    }

    #confirmModal .cmActions{
      padding: 12px 16px 16px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    #confirmModal .cmBtn{
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.18);
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    #confirmModal .cmBtn.primary{
      background: var(--g-primary);
      border-color: var(--g-primary);
      color: #fff;
    }
  </style>
</head>

<body>
  <!-- Genesys bootstrap -->
  <script type="text/javascript" charset="utf-8">
    (function (g, e, n, es, ys) {
      g['_genesysJs'] = e;
      g[e] = g[e] || function () { (g[e].q = g[e].q || []).push(arguments) };
      g[e].t = 1 * new Date();
      g[e].c = es;
      ys = document.createElement('script'); ys.async = 1; ys.src = n; ys.charset = 'utf-8'; document.head.appendChild(ys);
    })(window, 'Genesys', 'https://apps.sae1.pure.cloud/genesys-bootstrap/genesys.min.js', {
      environment: 'prod-sae1',
      deploymentId: '1fc215de-9fc1-483d-82a3-ce7c1fd29326'
    });
  </script>

  <button id="myLauncher" aria-label="Abrir chat" type="button">
    <img src="https://kitsoescola.com/wp-content/uploads/2021/03/unnamed.png" alt="Libras">
  </button>

  <section id="chatShell" aria-label="Chat">
    <header id="chatHeader">
      <div class="title">Envie uma mensagem</div>

      <div class="headerActions">
        <button class="iconBtn" id="minimizeChat" aria-label="Minimizar" type="button">–</button>
        <button class="iconBtn" id="closeChat" aria-label="Fechar" type="button">×</button>
      </div>
    </header>

    <div id="chatMessages"></div>
    <div id="typing">Digitando…</div>

    <footer id="chatComposer">
      <input id="chatInput" placeholder="Digite sua mensagem…" />
      <button id="sendBtn">Enviar</button>
    </footer>
  </section>

  <!-- Confirm modal -->
  <div id="confirmOverlay" aria-hidden="true">
    <div id="confirmModal" role="dialog" aria-modal="true" aria-label="Confirmar encerramento">
      <div class="cmHeader">Encerrar atendimento?</div>
      <div class="cmBody">
        Tem certeza que deseja encerrar esta conversa? Ao confirmar, o histórico será limpo e a sessão será finalizada.
      </div>
      <div class="cmActions">
        <button class="cmBtn" id="cancelClose" type="button">Cancelar</button>
        <button class="cmBtn primary" id="confirmClose" type="button">Encerrar</button>
      </div>
    </div>
  </div>

  <script>
    const elShell = document.getElementById("chatShell");
    const elLauncher = document.getElementById("myLauncher");
    const elClose = document.getElementById("closeChat");
    const elMinimize = document.getElementById("minimizeChat");

    const elMsgs = document.getElementById("chatMessages");
    const elInput = document.getElementById("chatInput");
    const elSend = document.getElementById("sendBtn");

    const elConfirmOverlay = document.getElementById("confirmOverlay");
    const elCancelClose = document.getElementById("cancelClose");
    const elConfirmClose = document.getElementById("confirmClose");

    const seenMsgIds = new Set();
    let introShown = false;

    const state = {
      ready: false,
      started: false,
      starting: false,
      softResetArmed: false,
      endNoticeShown: false
    };

    // =========================================================
    // ✅ ÚNICA ALTERAÇÃO PARA REFRESH:
    // - Salvar transcript + estado aberto/fechado em sessionStorage
    // - Restaurar transcript no load (para “parecer” que segue do mesmo ponto)
    // - NÃO executar nenhum clear/reset no refresh (já não existia aqui)
    // =========================================================
    const STORAGE = {
      transcript: "gc_current_transcript",
      chatOpen: "gc_chat_open"
    };

    function saveChatOpenState(){
      try { sessionStorage.setItem(STORAGE.chatOpen, isOpen() ? "1" : "0"); } catch(e) {}
    }

    // ===== Transcript (histórico) =====
    const transcript = []; // { from, text, ts }
    function addToTranscript(from, text, ts){
      transcript.push({ from, text, ts });

      // ✅ persistir para sobreviver ao refresh
      try { sessionStorage.setItem(STORAGE.transcript, JSON.stringify(transcript)); } catch(e) {}
    }

    // (mantido) arquiva histórico em localStorage quando encerra
    function persistTranscript(reason = "ended"){
      try{
        const key = "gc_webmsg_history";
        const existing = JSON.parse(localStorage.getItem(key) || "[]");
        existing.push({
          reason,
          endedAt: formatTimestampBrasilia(new Date()),
          messages: [...transcript]
        });
        localStorage.setItem(key, JSON.stringify(existing));
      }catch(e){
        console.warn("[HISTORY] persistTranscript failed", e);
      }
    }

    function isOpen(){ return elShell.classList.contains("open"); }

    function openUI(){
      elShell.classList.add("open");
      saveChatOpenState();
      setTimeout(() => {
        addIntroIfEmpty();
        elMsgs.scrollTop = elMsgs.scrollHeight;
      }, 0);
    }

    function closeUI(){
      elShell.classList.remove("open");
      saveChatOpenState();
    }

    function clearUI(){
      elMsgs.innerHTML = "";
      seenMsgIds.clear();
      introShown = false;
      transcript.length = 0;

      // ✅ limpar o “ponto salvo” quando o usuário encerra no X (hard reset)
      try { sessionStorage.removeItem(STORAGE.transcript); } catch(e) {}
      saveChatOpenState();
    }

    // ===== Timestamp Brasilia (dd/mm/AAAA às hh:mm:ss) =====
    function formatTimestampBrasilia(dateLike = Date.now()){
      const d = (dateLike instanceof Date) ? dateLike : new Date(dateLike);

      const dd = String(new Intl.DateTimeFormat("pt-BR", {
        timeZone: "America/Sao_Paulo",
        day: "2-digit"
      }).format(d));

      const mm = String(new Intl.DateTimeFormat("pt-BR", {
        timeZone: "America/Sao_Paulo",
        month: "2-digit"
      }).format(d));

      const yyyy = String(new Intl.DateTimeFormat("pt-BR", {
        timeZone: "America/Sao_Paulo",
        year: "numeric"
      }).format(d));

      const hhmmss = new Intl.DateTimeFormat("pt-BR", {
        timeZone: "America/Sao_Paulo",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(d);

      return `${dd}/${mm}/${yyyy} às ${hhmmss}`;
    }

    function addIntroIfEmpty(){
      if (introShown) return;

      const hasAnyBubble = elMsgs.querySelector(".msgRow");
      const hasSystemNotice = elMsgs.querySelector(".systemNotice");
      if (hasAnyBubble || hasSystemNotice) return;

      const el = document.createElement("div");
      el.className = "chatIntro";
      el.textContent = "Este é o início da sua conversa com a gente. Envie uma mensagem pra começar.";

      elMsgs.appendChild(el);
      elMsgs.scrollTop = elMsgs.scrollHeight;

      introShown = true;
    }

    function removeIntro(){
      const el = elMsgs.querySelector(".chatIntro");
      if (el) el.remove();
    }

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function linkify(text){
      const escaped = escapeHtml(text);
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return escaped
        .replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`)
        .replaceAll("\n", "<br/>");
    }

    function extractQuickRepliesFromStructured(m){
      const content = Array.isArray(m?.content) ? m.content : [];
      const buttons = [];

      content.forEach(item => {
        if (String(item?.contentType || "").toLowerCase() !== "quickreply") return;
        const qr = item.quickReply || {};
        const label = qr.text ?? "";
        const payload = qr.payload ?? label;
        if (!label) return;
        buttons.push({ label, payload });
      });

      return buttons;
    }

    function isSessionEndedError(err){
      const msg = String(err?.message || err || "").toLowerCase();
      return msg.includes("conversation session has ended");
    }

    function addEndNotice(){
      if (state.endNoticeShown) return;
      state.endNoticeShown = true;

      const el = document.createElement("div");
      el.className = "systemNotice";
      el.textContent = `A sua conversa foi finalizada\n${formatTimestampBrasilia(new Date())}`;

      elMsgs.appendChild(el);
      elMsgs.scrollTop = elMsgs.scrollHeight;
    }

    // ===== Reset conversation (para permitir nova sessão) =====
    async function resetConversationNow(){
      return await new Promise((resolve) => {
        try{
          Genesys("command", "MessagingService.resetConversation", {}, () => {
            console.log("[GENESYS] resetConversation success");
            state.started = false;
            state.starting = false;
            state.softResetArmed = false;
            state.endNoticeShown = false;
            seenMsgIds.clear();
            resolve(true);
          }, (err) => {
            console.warn("[GENESYS] resetConversation error", err);
            resolve(false);
          });
        }catch(e){
          console.warn("[GENESYS] resetConversation threw", e);
          resolve(false);
        }
      });
    }

    function armSoftReset(){
      state.started = false;
      state.starting = false;
      state.softResetArmed = true;
    }

    async function ensureFreshSessionIfNeeded(){
      if (!state.softResetArmed) return;

      console.log("[GENESYS] Soft reset armed: preparing new session");

      const okReset = await resetConversationNow();
      if (okReset){
        state.softResetArmed = false;
        return;
      }

      try {
        await new Promise((resolve) => {
          Genesys("command", "Messenger.clear", {}, () => resolve(true), () => resolve(false));
        });
      } catch(e){}

      try {
        await new Promise((resolve) => {
          Genesys("command", "MessagingService.clearConversation", {}, () => resolve(true), () => resolve(false));
        });
      } catch(e){}

      seenMsgIds.clear();
      state.softResetArmed = false;
      state.started = false;
      state.starting = false;
    }

    function startConversationIfNeeded(){
      if (!state.ready) {
        console.warn("[GENESYS] startConversation blocked: not ready yet");
        return Promise.resolve(false);
      }
      if (state.started || state.starting) return Promise.resolve(true);

      state.starting = true;
      console.log("[GENESYS] Calling MessagingService.startConversation");

      return new Promise((resolve) => {
        Genesys("command", "MessagingService.startConversation", {}, () => {
          console.log("[GENESYS] startConversation success");
          state.started = true;
          state.starting = false;
          state.softResetArmed = false;
          state.endNoticeShown = false;
          resolve(true);
        }, (err) => {
          console.warn("[GENESYS] startConversation error:", err);

          const msg = String(err || "").toLowerCase();
          if (msg.includes("already an active conversation")) {
            state.started = true;
            state.starting = false;
            state.softResetArmed = false;
            state.endNoticeShown = false;
            resolve(true);
            return;
          }

          state.started = false;
          state.starting = false;
          resolve(false);
        });
      });
    }

    async function sendMessageWithRetry(message){
      await ensureFreshSessionIfNeeded();

      const ok = await startConversationIfNeeded();
      if (!ok) return false;

      return await new Promise((resolve) => {
        console.log("[GENESYS] Calling MessagingService.sendMessage", { message });

        Genesys("command", "MessagingService.sendMessage", { message }, () => {
          console.log("[GENESYS] sendMessage success");
          resolve(true);
        }, async (err) => {
          console.error("[GENESYS] sendMessage error", err);

          if (isSessionEndedError(err)) {
            console.log("[GENESYS] Detected ended session on send. Persist + reset + retry once.");

            addEndNotice();
            persistTranscript("send_failed_session_ended");

            await resetConversationNow();

            const ok2 = await startConversationIfNeeded();
            if (!ok2) return resolve(false);

            Genesys("command", "MessagingService.sendMessage", { message }, () => {
              console.log("[GENESYS] sendMessage retry success");
              resolve(true);
            }, (err2) => {
              console.error("[GENESYS] sendMessage retry error", err2);
              resolve(false);
            });

            return;
          }

          resolve(false);
        });
      });
    }

    async function sendPayload(payload){
      console.log("[GENESYS] sendMessage (quickReply)", { message: payload });
      await sendMessageWithRetry(payload);
    }

    // ✅ render normal (persiste no transcript/storage)
    function addBubble({from="agent", text="", time=null, buttons=[]}){
      removeIntro();

      const row = document.createElement("div");
      row.className = `msgRow ${from}`;

      const wrap = document.createElement("div");

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = linkify(text || "");

      const meta = document.createElement("div");
      meta.className = "meta";

      const tsFinal = time ? time : formatTimestampBrasilia(new Date());
      meta.textContent = tsFinal;

      addToTranscript(from, text || "", tsFinal);

      wrap.appendChild(bubble);
      wrap.appendChild(meta);

      if (buttons && buttons.length) {
        const qrWrap = document.createElement("div");
        qrWrap.className = "quickReplies";

        buttons.forEach(btn => {
          const b = document.createElement("button");
          b.type = "button";
          b.textContent = btn.label;

          b.addEventListener("click", async () => {
            addBubble({from:"customer", text: btn.label, time: formatTimestampBrasilia(new Date())});
            await sendPayload(btn.payload);
            [...qrWrap.querySelectorAll("button")].forEach(x => x.disabled = true);
          });

          qrWrap.appendChild(b);
        });

        wrap.appendChild(qrWrap);
      }

      row.appendChild(wrap);
      elMsgs.appendChild(row);
      elMsgs.scrollTop = elMsgs.scrollHeight;
    }

    // ✅ render sem persistir (para restaurar do storage sem duplicar)
    function addBubbleFromStorage({from="agent", text="", time=null}){
      removeIntro();

      const row = document.createElement("div");
      row.className = `msgRow ${from}`;

      const wrap = document.createElement("div");

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = linkify(text || "");

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = time ? time : "";

      wrap.appendChild(bubble);
      wrap.appendChild(meta);

      row.appendChild(wrap);
      elMsgs.appendChild(row);
    }

    // ✅ RESTAURA histórico no refresh
    function restoreTranscriptFromStorage(){
      let saved = null;
      try {
        const raw = sessionStorage.getItem(STORAGE.transcript);
        if (!raw) return;
        saved = JSON.parse(raw);
      } catch(e) { return; }

      if (!Array.isArray(saved) || saved.length === 0) return;

      // limpa UI e re-renderiza
      elMsgs.innerHTML = "";
      introShown = false;

      // repopula array em memória sem disparar persistência (e sem duplicar storage)
      transcript.length = 0;
      saved.forEach(m => {
        transcript.push(m);
        addBubbleFromStorage({ from: m.from, text: m.text, time: m.ts });
      });

      elMsgs.scrollTop = elMsgs.scrollHeight;
    }

    async function sendTextMessage(text){
      if (!text || !text.trim()) return;
      addBubble({from:"customer", text, time: formatTimestampBrasilia(new Date())});
      await sendMessageWithRetry(text);
    }

    function hardResetLikeNativeBin(){
      persistTranscript("closed_by_user");

      closeUI();
      clearUI();
      state.started = false;
      state.starting = false;
      state.softResetArmed = false;
      state.endNoticeShown = false;

      try { Genesys("command", "MessagingService.clearConversation", {}, ()=>{}, ()=>{}); } catch(e){}
      try { Genesys("command", "Messenger.clear", {}, ()=>{}, ()=>{}); } catch(e){}
      setTimeout(() => window.location.reload(), 400);
    }

    function openConfirmClose(){
      elConfirmOverlay.classList.add("open");
      elConfirmOverlay.setAttribute("aria-hidden", "false");
    }

    function closeConfirmClose(){
      elConfirmOverlay.classList.remove("open");
      elConfirmOverlay.setAttribute("aria-hidden", "true");
    }

    Genesys("subscribe", "MessagingService.ready", () => {
      console.log("[GENESYS] MessagingService.ready");
      state.ready = true;

      // ✅ no refresh, “volta” o histórico visual
      restoreTranscriptFromStorage();

      // ✅ reabre se estava aberto
      try {
        if (sessionStorage.getItem(STORAGE.chatOpen) === "1") {
          openUI();
        }
      } catch(e) {}
    });

    Genesys("subscribe", "MessagingService.started", (e) => {
      console.log("[GENESYS] MessagingService.started", e);
      state.started = true;
      state.starting = false;
    });

    // ✅ MAIS CONFIÁVEL: disparado quando o chat é desconectado/encerrado do lado Genesys
    Genesys("subscribe", "MessagingService.conversationDisconnected", async (e) => {
      console.log("[GENESYS] MessagingService.conversationDisconnected", e);

      addEndNotice(); // aparece imediatamente
      persistTranscript("ended_by_genesys_disconnected");

      state.softResetArmed = true;
      await resetConversationNow(); // já deixa pronto pra iniciar nova conversa
    });

    // ✅ Backup: alguns cenários disparam ended
    Genesys("subscribe", "MessagingService.ended", async (e) => {
      console.log("[GENESYS] MessagingService.ended", e);

      addEndNotice();
      persistTranscript("ended_by_genesys_ended");

      state.softResetArmed = true;
      await resetConversationNow();
    });

    Genesys("subscribe", "MessagingService.messagesReceived", (event) => {
      const msgs = (event && event.data && event.data.messages) || event.messages || [];
      msgs.forEach(m => {
        const id = m.id || m.messageId || m.metadata?.id;
        if (id && seenMsgIds.has(id)) return;
        if (id) seenMsgIds.add(id);

        if (String(m.direction).toLowerCase() === "inbound") return;

        const type = String(m.type || "").toLowerCase();
        const text = m.text || m.body?.text || m.message || "";

        const buttons = (type === "structured")
          ? extractQuickRepliesFromStructured(m)
          : [];

        if (!text && !buttons.length) return;

        const tsRaw =
          m.time ||
          m.timestamp ||
          m.createdDate ||
          m.createdAt ||
          m.metadata?.timestamp ||
          m.metadata?.createdAt ||
          null;

        const ts = tsRaw ? formatTimestampBrasilia(tsRaw) : formatTimestampBrasilia(new Date());

        addBubble({
          from: "agent",
          text: text || "",
          time: ts,
          buttons
        });
      });
    });

    // Launcher toggle
    elLauncher.addEventListener("click", async () => {
      if (isOpen()) { closeUI(); return; }
      openUI();

      await ensureFreshSessionIfNeeded();
      await startConversationIfNeeded();
    });

    // Minimizar (não encerra)
    elMinimize.addEventListener("click", () => closeUI());

    // Fechar: pede confirmação
    elClose.addEventListener("click", () => openConfirmClose());

    // Modal actions
    elCancelClose.addEventListener("click", () => closeConfirmClose());

    elConfirmClose.addEventListener("click", () => {
      closeConfirmClose();
      hardResetLikeNativeBin();
    });

    // clicar fora do modal cancela
    elConfirmOverlay.addEventListener("click", (e) => {
      if (e.target === elConfirmOverlay) closeConfirmClose();
    });

    // ESC fecha modal
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && elConfirmOverlay.classList.contains("open")) {
        closeConfirmClose();
      }
    });

    elSend.addEventListener("click", async () => {
      const text = elInput.value;
      elInput.value = "";
      await sendTextMessage(text);
    });

    elInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        elSend.click();
      }
    });

    // ✅ salva estado aberto/fechado antes do refresh (não encerra nada)
    window.addEventListener("beforeunload", () => {
      saveChatOpenState();
      // NÃO chamamos Genesys clear/reset aqui (refresh não encerra interação)
    });
  </script>
</body>
</html>
